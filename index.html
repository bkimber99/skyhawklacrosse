<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salem Hills Lacrosse</title>
  <meta name="description" content="Official Site of Salem Hills Lacrosse" />
  <link rel="icon" type="image/png" href="./favicon.png" />
  <style>
    :root {
      --navy: #0C2340;
      --sky: #7BA4DB;
      --white: #FFFFFF;
      --gold: #B3A369;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, rgba(123, 164, 219, 0.16), transparent 35%),
        linear-gradient(180deg, #102c4e 0%, var(--navy) 45%, #08172c 100%);
      color: var(--white);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
      padding: 24px;
    }

    .wrap {
      width: min(100%, 900px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .logo {
      width: min(100%, 760px);
      height: auto;
      display: block;
      filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.35));
    }

    .headline {
      margin: 0;
      font-size: clamp(1.25rem, 2vw + 0.9rem, 2rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--white);
    }

    .accent {
      width: 96px;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--sky), var(--gold));
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img class="logo" src="./banner-logo.png" alt="Salem Hills Skyhawk Lacrosse" />
    <div class="accent" aria-hidden="true"></div>
    <h1 class="headline">Official Site of Salem Hills Lacrosse</h1>
  </main>
</body>
</html>
